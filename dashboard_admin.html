            background-color: var(--background);

                inset 0 -1px 2px rgba(0, 0, 0, 0.05);

            width: 8px;

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);

            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);

<body class="min-h-screen">
    <!-- Navigation Shell -->
    <nav class="fixed top-0 left-0 w-full z-50 border-b border-b-glass-border bg-black/40 backdrop-blur-md"

        <div class="max-w-7xl mx-auto px-container-margin h-20 flex items-center justify-between">

                    onerror="this.src='https://via.placeholder.com/32'; this.classList.remove('invert')">

            <button id="logout-btn"

    <main class="max-w-7xl mx-auto pt-[120px] pb-stack-lg px-container-margin">
        <!-- Header Section -->
        <header
            class="mb-stack-lg flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-[rgba(255,255,255,0.08)] pb-8">
            <h1 class="font-headline-lg text-headline-lg text-on-surface">Admin Dashboard</h1>

            <!-- Search Pill -->
            <div class="relative max-w-md w-full">
                <span
                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
                <input type="text" id="search-input" placeholder="Cari nama file atau NIM..."

        <!-- Main Content: Just the Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-gutter" id="files-grid">
            <!-- Script will inject cards here -->
        </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://pyazxjshahhqslhsafli.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5YXp4anNoYWhocXNsaHNhZmxpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MTAzMzYsImV4cCI6MjA5NzA4NjMzNn0.Muq2wy7hWGioFO886xNBt5GIcqS0osIi4Qad-eTkOOs';
        const supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        // Efek bersinar pada kartu
        function applyGlowEffect() {
            document.querySelectorAll('.glass-card').forEach(card => {
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    card.style.setProperty('--mouse-x', `${x}px`);
                    card.style.setProperty('--mouse-y', `${y}px`);
                    card.style.background = `radial-gradient(400px circle at ${x}px ${y}px, rgba(255,255,255,0.08), transparent 40%), rgba(255,255,255,0.05)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.background = 'rgba(255, 255, 255, 0.05)';
                });
            });
        }

        function renderFileCard(name, size, date, type, previewDataUrl, nim, studentName, noteUrl = null, fullFileName = '') {
            const grid = document.getElementById('files-grid');

            let iconName = 'description';
            if (type.includes('image')) iconName = 'image';
            if (type.includes('pdf')) iconName = 'picture_as_pdf';
            if (type.includes('zip') || type.includes('rar')) iconName = 'folder_zip';

            const escapedName = name.replace(/'/g, "\\'");
            const safeNim = nim || 'Unknown';
            const safeStudentName = studentName || 'Unknown Student';

            // For admin, clicking opens in new tab
            const clickAction = previewDataUrl ? `window.open('${previewDataUrl}', '_blank')` : "alert('File preview tidak tersedia')";

            const noteButton = noteUrl ? `<button onclick="event.stopPropagation(); window.open('${noteUrl}', '_blank')" class="mt-2 text-xs bg-primary/10 text-primary hover:bg-primary/20 px-3 py-1.5 rounded-lg w-full flex items-center justify-center gap-1.5 transition-colors border border-primary/20"><span class="material-symbols-outlined text-[14px]">description</span> Lihat Catatan</button>` : '';

            const deleteButton = `<button onclick="deleteAdminFile(event, this, '${fullFileName}')" class="absolute top-3 right-3 bg-red-500/20 hover:bg-red-500/80 text-red-400 hover:text-white rounded-lg p-2 flex items-center justify-center transition-colors z-10 border border-red-500/30 hover:border-red-500" title="Hapus File"><span class="material-symbols-outlined text-[18px]">delete</span></button>`;
            const isTextSubmission = type === 'text/html' || name.endsWith('.html') || (type === 'text/plain' && name.endsWith('.txt') && !name.endsWith('_note.txt'));
            const downloadDocxBtn = isTextSubmission ? `<button onclick="downloadDocxAdmin(event, '${previewDataUrl}', '${escapedName}')" class="absolute top-3 right-[48px] bg-green-500/20 hover:bg-green-500/80 text-green-400 hover:text-white rounded-lg p-2 flex items-center justify-center transition-colors z-10 border border-green-500/30 hover:border-green-500" title="Download Word"><span class="material-symbols-outlined text-[18px]">description</span></button>` : '';

            const card = `
            <div class="glass-card file-card p-5 hover:border-[rgba(255,255,255,0.3)] transition-all duration-300 group cursor-pointer flex flex-col gap-4 relative"
                style="background: rgba(255, 255, 255, 0.05);" onclick="${clickAction}" data-name="${name.toLowerCase()}" data-nim="${safeNim.toLowerCase()}" data-studentname="${safeStudentName.toLowerCase()}">
                ${downloadDocxBtn}
                ${deleteButton}
                
                <div class="w-full h-32 rounded-lg overflow-hidden bg-primary-container/20 flex items-center justify-center relative">
                    ${type.includes('image') && previewDataUrl
                    ? `<img src="${previewDataUrl}" alt="Thumbnail" class="w-full h-full object-cover">`
                    : `<span class="material-symbols-outlined text-[48px] text-primary-fixed-dim">${iconName}</span>`
                }
                </div>
                
                <div class="flex-grow flex flex-col">
                    <h4 class="font-headline-md text-[16px] text-on-surface truncate w-full mb-1" title="${name}">
                        ${name}
                    </h4>
                    <p class="font-label-sm text-[11px] text-on-surface-variant mb-2 truncate" title="${safeStudentName}">
                        Nama: <span class="text-primary">${safeStudentName}</span><br>
                        NIM: <span class="text-primary">${safeNim}</span>
                    </p>
                    <p class="font-label-sm text-label-sm text-on-surface-variant flex items-center justify-between mb-auto">
                        <span>${size} MB</span>
                        <span>${date}</span>
                    </p>
                    ${noteButton}
                </div>
            </div>`;

            grid.insertAdjacentHTML('beforeend', card);
        }

        async function deleteAdminFile(event, button, fullFileName) {
            event.stopPropagation();

            const isConfirmed = await showCustomModal('confirm', 'Konfirmasi Hapus', 'Apakah kamu yakin ingin menghapus file ini secara permanen dari database?');
            if (!isConfirmed) return;

            const card = button.closest('.glass-card');
            const originalHtml = button.innerHTML;
            button.innerHTML = `<span class="material-symbols-outlined text-[18px] animate-spin">refresh</span>`;
            button.disabled = true;

            try {
                const filesToRemove = [fullFileName];

                const parts = fullFileName.split('_');
                if (parts.length >= 2 && parts[0].length === 8 && !isNaN(parts[0])) {
                    const nim = parts[0];
                    const timestamp = parts[1];
                    filesToRemove.push(`${nim}_${timestamp}_note.txt`);
                }

                const { data, error } = await supabaseClient.storage.from('certificates').remove(filesToRemove);

                if (error || !data || data.length === 0) {
                    console.error("Gagal menghapus:", error || "File tidak ditemukan atau akses ditolak RLS");
                    await showCustomModal('error', 'Gagal Menghapus', "Pesan Error: " + (error ? error.message : "Akses ditolak atau file tidak ada.") + " Pastikan Policy DELETE sudah diatur di Supabase Storage.");
                    button.innerHTML = originalHtml;
                    button.disabled = false;
                } else {
                    card.remove();
                    const grid = document.getElementById('files-grid');
                    // Cek jika kosong tapi abaikan elemen .emptyFolderPlaceholder yang mungkin disembunyikan
                    const visibleCards = grid.querySelectorAll('.file-card');
                    if (visibleCards.length === 0) {
                        grid.innerHTML = `
                            <div id="empty-history-state" class="glass-card p-10 flex flex-col items-center justify-center text-center border-dashed border border-[rgba(255,255,255,0.15)] col-span-full h-[400px]" style="background: rgba(255, 255, 255, 0.05);">
                                <span class="material-symbols-outlined text-[64px] text-on-surface-variant/40 mb-4" style="font-variation-settings: 'FILL' 0;">folder_open</span>
                                <h4 class="font-headline-md text-[20px] text-on-surface mb-2">Belum ada file</h4>
                                <p class="font-body-md text-on-surface-variant max-w-sm">File sertifikat yang diupload oleh siswa akan muncul di sini.</p>
                            </div>
                        `;
                    }
                }
            } catch (err) {
                console.error("Kesalahan:", err);
                await showCustomModal('error', 'Terjadi Kesalahan', err.message);
                button.innerHTML = originalHtml;
                button.disabled = false;
            }
        }

        async function downloadDocxAdmin(event, url, filename) {
            event.stopPropagation();
            const btn = event.currentTarget;
            const originalHtml = btn.innerHTML;
            btn.innerHTML = `<span class="material-symbols-outlined text-[18px] animate-spin">refresh</span>`;
            
            try {
                // Tambahkan cache-buster agar selalu mengambil versi terbaru
                const cacheBustedUrl = url + '?t=' + Date.now();
                const response = await fetch(cacheBustedUrl, { cache: 'no-store' });
                const html = await response.text();
                
                const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<(\/body)>/i);
                const content = bodyMatch ? bodyMatch[1] : html;

                const preHtml = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Doc</title></head><body>";
                const postHtml = "<" + "/body><" + "/html>";
                const fullHtml = preHtml + content + postHtml;

                const blob = new Blob(['\\ufeff', fullHtml], { type: 'application/msword' });
                
                const downloadLink = document.createElement("a");
                document.body.appendChild(downloadLink);
                downloadLink.href = URL.createObjectURL(blob);
                
                const safeFilename = filename.replace('.html', '').replace(/[^a-zA-Z0-9_-]/g, '_') + '.doc';
                downloadLink.download = safeFilename;
                
                downloadLink.click();
                document.body.removeChild(downloadLink);
            } catch (e) {
                console.error("Gagal mendownload DOC:", e);
                await showCustomModal('error', 'Gagal Mendownload', 'Terjadi kesalahan saat mengonversi file ke format DOC.');
            } finally {
                btn.innerHTML = originalHtml;
            }
        }

        async function getAllFilesFromSupabase(bucket, path = '') {
            if (!supabaseClient) return [];
            try {
                const { data, error } = await supabaseClient.storage.from(bucket).list(path);
                if (error || !data) return [];
                
                let allFiles = [];
                for (const item of data) {
                    if (item.name === '.emptyFolderPlaceholder') continue;
                    
                    const fullPath = path === '' ? item.name : `${path}/${item.name}`;
                    
                    // Folder have id === null in Supabase storage
                    if (item.id === null) { 
                        const subFiles = await getAllFilesFromSupabase(bucket, fullPath);
                        allFiles = allFiles.concat(subFiles);
                    } else { 
                        item.fullPath = fullPath;
                        allFiles.push(item);
                    }
                }
                return allFiles;
            } catch (e) {
                console.error("Error fetching files at path:", path, e);
                return [];
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            // Check admin session
            const adminName = localStorage.getItem('admin_name');

            if (!adminName) {
                window.location.href = 'index.html';
                return;
            }

            // Fetch students from Supabase to map NIM -> Name
            let studentMap = {};
            if (supabaseClient) {
                try {
                    const { data, error } = await supabaseClient.from('students').select('nim, name');
                    if (data) {
                        data.forEach(s => {
                            studentMap[s.nim] = s.name;
                        });
                    }
                } catch (err) {
                    console.error("Gagal mengambil data student:", err);
                }
            }

            // Load files from Supabase Storage
            const grid = document.getElementById('files-grid');
            let hasFiles = false;

            if (supabaseClient) {
                try {
                    const files = await getAllFilesFromSupabase('certificates');
                    if (files && files.length > 0) {
                        hasFiles = true;

                        // Separate notes and main files
                        const notes = {};
                        const mainFiles = [];

                        files.forEach(file => {
                            const nameToParse = file.fullPath.split('/').pop();
                            if (nameToParse.endsWith('_note.txt')) {
                                const parts = nameToParse.split('_');
                                if (parts.length >= 2) {
                                    const nim = parts[0];
                                    const ts = parts[1];
                                    notes[`${nim}_${ts}`] = file;
                                }
                            } else {
                                mainFiles.push(file);
                            }
                        });

                        // Sort by created_at desc
                        mainFiles.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                        for (const file of mainFiles) {
                            let uNim = 'Unknown';
                            const originalFileName = file.fullPath.split('/').pop();
                            let actualName = originalFileName;
                            let noteUrl = null;

                            const parts = originalFileName.split('_');
                            if (parts.length >= 3 && parts[0].length === 8 && !isNaN(parts[0])) {
                                uNim = parts[0];
                                const ts = parts[1];
                                actualName = parts.slice(2).join('_');

                                if (notes[`${uNim}_${ts}`]) {
                                    const { data: noteUrlData } = supabaseClient.storage.from('certificates').getPublicUrl(notes[`${uNim}_${ts}`].fullPath);
                                    noteUrl = noteUrlData.publicUrl;
                                }
                            } else if (parts.length >= 2 && !isNaN(parts[0])) {
                                actualName = parts.slice(1).join('_');
                            }

                            const studentName = studentMap[uNim] || 'Unknown Student';
                            const sizeMB = (file.metadata?.size / (1024 * 1024)).toFixed(2) || '0.00';
                            const date = new Date(file.created_at).toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' });
                            const type = file.metadata?.mimetype || 'application/octet-stream';

                            const { data: urlData } = supabaseClient.storage.from('certificates').getPublicUrl(file.fullPath);
                            const previewDataUrl = urlData.publicUrl;

                            renderFileCard(actualName, sizeMB, date, type, previewDataUrl, uNim, studentName, noteUrl, file.fullPath);
                        }
                    }
                } catch (err) {
                    console.error("Gagal mengambil data file:", err);
                }
            }

            if (!hasFiles) {
                grid.innerHTML = `
                    <div id="empty-history-state" class="glass-card p-10 flex flex-col items-center justify-center text-center border-dashed border border-[rgba(255,255,255,0.15)] col-span-full h-[400px]" style="background: rgba(255, 255, 255, 0.05);">
                        <span class="material-symbols-outlined text-[64px] text-on-surface-variant/40 mb-4" style="font-variation-settings: 'FILL' 0;">folder_open</span>
                        <h4 class="font-headline-md text-headline-md text-on-surface mb-2">Belum ada file</h4>
                        <p class="font-body-md text-body-md text-on-surface-variant max-w-[300px]">Data atau file yang diupload oleh peserta akan muncul di sini.</p>
                    </div>
                `;
            }

            // Search logic
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const query = e.target.value.toLowerCase();
                    const cards = document.querySelectorAll('.file-card');
                    let visibleCount = 0;

                    cards.forEach(card => {
                        const nameAttr = card.getAttribute('data-name') || '';
                        const nimAttr = card.getAttribute('data-nim') || '';
                        const studentAttr = card.getAttribute('data-studentname') || '';

                        if (nameAttr.includes(query) || nimAttr.includes(query) || studentAttr.includes(query)) {
                            card.style.display = 'flex';
                            visibleCount++;
                        } else {
                            card.style.display = 'none';
                        }
                    });

                    let emptyState = document.getElementById('empty-search-state');
                    if (visibleCount === 0 && cards.length > 0) {
                        if (!emptyState) {
                            grid.insertAdjacentHTML('beforeend', `
                                <div id="empty-search-state" class="glass-card p-10 flex flex-col items-center justify-center text-center border-dashed border border-[rgba(255,255,255,0.15)] col-span-full h-[400px]" style="background: rgba(255, 255, 255, 0.05);">
                                    <span class="material-symbols-outlined text-[64px] text-on-surface-variant/40 mb-4" style="font-variation-settings: 'FILL' 0;">search_off</span>
                                    <h4 class="font-headline-md text-headline-md text-on-surface mb-2">Pencarian tidak ditemukan</h4>
                                    <p class="font-body-md text-body-md text-on-surface-variant max-w-[300px]">Coba gunakan kata kunci nama file atau NIM lain.</p>
                                </div>
                            `);
                        } else {
                            emptyState.style.display = 'flex';
                        }
                    } else if (emptyState) {
                        emptyState.style.display = 'none';
                    }
                });
            }

            applyGlowEffect();

            // Logout
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    localStorage.removeItem('admin_name');
                    window.location.href = 'index.html';
                });
            }
        });
    </script>

    <!-- Custom Modal -->
    <div id="custom-modal"
        class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/60 backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="glass-card p-6 max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300 flex flex-col"
            style="background: rgba(20, 20, 20, 0.85); border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
            <div class="flex items-center gap-3 mb-4 text-red-400" id="modal-icon-container">
                <span class="material-symbols-outlined text-[28px]" id="modal-icon"
                    style="font-variation-settings: 'FILL' 1;">warning</span>
                <h3 class="font-headline-md text-[18px] text-on-surface font-semibold" id="modal-title">Konfirmasi</h3>
            </div>
            <p class="font-body-md text-[14px] text-on-surface-variant mb-6 leading-relaxed" id="modal-message">
                Pesan di sini
            </p>
            <div class="flex items-center justify-end gap-3 mt-auto pt-2">
                <button id="modal-cancel-btn"
                    class="px-4 py-2 rounded-xl text-on-surface-variant hover:bg-white/5 hover:text-white transition-colors text-[14px] font-medium hidden">
                    Batal
                </button>
                <button id="modal-confirm-btn"
                    class="px-4 py-2 rounded-xl bg-red-500/20 text-red-400 hover:bg-red-500 hover:text-white transition-colors border border-red-500/30 text-[14px] font-medium min-w-[80px]">
                    Hapus
                </button>
            </div>
        </div>
    </div>

    <script>
        function showCustomModal(type, title, message) {
            return new Promise((resolve) => {
                const modal = document.getElementById('custom-modal');
                const modalBox = modal.querySelector('.glass-card');
                const titleEl = document.getElementById('modal-title');
                const messageEl = document.getElementById('modal-message');
                const iconEl = document.getElementById('modal-icon');
                const cancelBtn = document.getElementById('modal-cancel-btn');
                const confirmBtn = document.getElementById('modal-confirm-btn');
                const iconContainer = document.getElementById('modal-icon-container');

                titleEl.textContent = title;
                messageEl.textContent = message;

                if (type === 'confirm') {
                    iconEl.textContent = 'warning';
                    iconContainer.className = 'flex items-center gap-3 mb-4 text-red-400';
                    cancelBtn.classList.remove('hidden');
                    confirmBtn.textContent = 'Hapus';
                    confirmBtn.className = 'px-4 py-2 rounded-xl bg-red-500/20 text-red-400 hover:bg-red-500 hover:text-white transition-colors border border-red-500/30 text-[14px] font-medium min-w-[80px]';
                } else if (type === 'error') {
                    iconEl.textContent = 'error';
                    iconContainer.className = 'flex items-center gap-3 mb-4 text-red-400';
                    cancelBtn.classList.add('hidden');
                    confirmBtn.textContent = 'Tutup';
                    confirmBtn.className = 'px-4 py-2 rounded-xl bg-white/5 text-on-surface hover:bg-white/10 transition-colors border border-white/10 text-[14px] font-medium min-w-[80px]';
                } else {
                    iconEl.textContent = 'info';
                    iconContainer.className = 'flex items-center gap-3 mb-4 text-primary';
                    cancelBtn.classList.add('hidden');
                    confirmBtn.textContent = 'OK';
                    confirmBtn.className = 'px-4 py-2 rounded-xl bg-primary/20 text-primary hover:bg-primary/40 transition-colors border border-primary/30 text-[14px] font-medium min-w-[80px]';
                }

                modal.classList.remove('hidden');
                modal.classList.add('flex');

                // Animasi masuk
                requestAnimationFrame(() => {
                    modal.classList.remove('opacity-0');
                    modalBox.classList.remove('scale-95');
                });

                const closeModal = (result) => {
                    modal.classList.add('opacity-0');
                    modalBox.classList.add('scale-95');
                    setTimeout(() => {
                        modal.classList.add('hidden');
                        modal.classList.remove('flex');
                        resolve(result);
                    }, 300); // durasi sesuai transition tailwind
                };

                cancelBtn.onclick = () => closeModal(false);
                confirmBtn.onclick = () => closeModal(true);
            });
        }
    </script>
</body>

</html>
