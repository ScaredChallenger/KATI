<!DOCTYPE html>
<html class="dark" lang="en" style="">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>KATI-CERTIFIED UPLOUDER - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#0e0e0e",
                        "primary": "#dbfcff",
                        "surface-bright": "#3a3939",
                        "on-secondary-fixed-variant": "#7200a3",
                        "on-primary-fixed": "#002022",
                        "outline": "#849495",
                        "on-background": "#e5e2e1",
                        "primary-fixed-dim": "#00dbe9",
                        "surface-dim": "#131313",
                        "tertiary-fixed-dim": "#e9c400",
                        "on-tertiary-fixed-variant": "#554600",
                        "on-primary-container": "#006970",
                        "on-surface": "#e5e2e1",
                        "outline-variant": "#3b494b",
                        "background": "#131313",
                        "tertiary-fixed": "#ffe171",
                        "inverse-on-surface": "#313030",
                        "secondary-fixed": "#f6d9ff",
                        "primary-fixed": "#7df4ff",
                        "surface-container-low": "#1c1b1b",
                        "on-secondary": "#510074",
                        "surface-container": "#201f1f",
                        "secondary": "#e9b3ff",
                        "inverse-surface": "#e5e2e1",
                        "on-primary": "#00363a",
                        "tertiary": "#fff5dd",
                        "on-tertiary-container": "#705d00",
                        "primary-container": "#00f0ff",
                        "surface-container-highest": "#353534",
                        "surface-container-high": "#2a2a2a",
                        "secondary-fixed-dim": "#e9b3ff",
                        "on-tertiary": "#3b2f00",
                        "on-primary-fixed-variant": "#004f54",
                        "on-secondary-container": "#e5a9ff",
                        "on-secondary-fixed": "#310048",
                        "on-surface-variant": "#b9cacb",
                        "surface-variant": "#353534",
                        "on-error": "#690005",
                        "surface-tint": "#00dbe9",
                        "error": "#ffb4ab",
                        "error-container": "#93000a",
                        "secondary-container": "#7d01b1",
                        "on-tertiary-fixed": "#221b00",
                        "on-error-container": "#ffdad6",
                        "inverse-primary": "#006970",
                        "tertiary-container": "#ffd60b",
                        "surface": "#131313"

                    "borderRadius": {

                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],

                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }]

    <style>
        body {
            background-color: #0A0A0A;
            color: #e5e2e1;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .neon-trail {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
            animation: float 20s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% {
                transform: translate(-20%, -20%) scale(1);
            }

            100% {
                transform: translate(20%, 20%) scale(1.2);
            }
        }

        .input-focus-ring:focus-within {
            border-color: #00dbe9;
            box-shadow: 0 0 15px rgba(0, 219, 233, 0.2);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center relative bg-surface min-h-screen">
    <!-- Atmospheric Background Elements -->
    <div class="neon-trail bg-primary top-[-10%] left-[-10%]" style="transform: translate(2.98437px, 9.92116px);"></div>
    <div class="neon-trail bg-secondary bottom-[-10%] right-[-10%]"
        style="animation-delay: -5s; transform: translate(5.96875px, 19.8423px);"></div>
    <div class="neon-trail bg-primary-fixed-dim bottom-[20%] left-[30%]"
        style="animation-delay: -10s; width: 300px; height: 300px; transform: translate(8.95312px, 29.7635px);"></div>
    <main class="relative z-10 w-full max-w-[480px] px-container-margin my-auto">
        <!-- Login Card -->
        <div class="glass-card rounded-[24px] p-stack-lg shadow-2xl flex flex-col items-center">
            <!-- Brand Anchor Header (Identity from JSON) -->
            <div class="text-center mb-stack-lg">
                <h1 class="font-headline-lg text-headline-lg text-on-surface mb-base tracking-tight">CERTIFIED UPLOUDER
                </h1>
                <p class="font-body-md text-body-md text-on-surface-variant">Access your certification vault</p>
            </div>
            <!-- Access Form -->
            <form class="w-full space-y-stack-md" onsubmit="handleLogin(event)">
                <!-- Full Name Input -->
                <div class="space-y-base">
                    <label
                        class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest ml-1">Full
                        Name</label>
                    <div
                        class="relative flex items-center bg-black/20 border border-outline-variant rounded-lg transition-all duration-300 input-focus-ring">
                        <span class="material-symbols-outlined absolute left-4 text-on-surface-variant"
                            data-icon="person">person</span>
                        <input
                            class="w-full bg-transparent border-none text-on-surface pl-12 py-4 focus:ring-0 font-body-md placeholder:text-outline"
                            placeholder="Enter your full name" type="text">
                    </div>
                </div>
                <!-- Student NIM Input -->
                <div class="space-y-base">
                    <label
                        class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest ml-1">Student
                        NIM</label>
                    <div
                        class="relative flex items-center bg-black/20 border border-outline-variant rounded-lg transition-all duration-300 input-focus-ring">
                        <span class="material-symbols-outlined absolute left-4 text-on-surface-variant"
                            data-icon="badge">badge</span>
                        <input
                            class="w-full bg-transparent border-none text-on-surface pl-12 py-4 focus:ring-0 font-body-md placeholder:text-outline"
                            maxlength="9" placeholder="Enter your 9-digit NIM" type="text">
                    </div>
                    <p class="text-[11px] font-label-sm text-outline ml-1">Enter your 9-digit NIM</p>
                </div>
                <!-- Submit Button -->
                <button
                    class="w-full bg-on-surface text-surface font-headline-md py-4 rounded-lg font-bold transition-all duration-300 hover:scale-[1.02] active:scale-95 shadow-[0_0_20px_rgba(255,255,255,0.1)] mt-base"
                    type="submit">
                    Submit NIM and Name
                </button>
            </form>
            <!-- Social/Secondary Visuals (Optional micro-interaction) -->
            <div class="mt-stack-lg w-full flex items-center justify-center gap-base opacity-20">
                <div class="h-[1px] flex-grow bg-outline-variant"></div>
                <span class="material-symbols-outlined text-[16px]" data-icon="security">security</span>
                <div class="h-[1px] flex-grow bg-outline-variant"></div>
            </div>
        </div>
        <!-- Footer Policy (Consistent with JSON requirements) -->
        <div class="mt-stack-lg text-center px-gutter">
            <p class="font-label-sm text-label-sm text-on-surface-variant leading-relaxed opacity-60">
                By using this platform, you agree to the University Code of Conduct &amp; Privacy Policy.
            </p>
        </div>
    </main>
    <!-- Micro-interaction for mouse movement to shift background slightly -->
    <script>
        document.addEventListener('mousemove', (e) => {
            const trails = document.querySelectorAll('.neon-trail');
            const x = (e.clientX / window.innerWidth) - 0.5;
            const y = (e.clientY / window.innerHeight) - 0.5;

            trails.forEach((trail, index) => {
                const speed = (index + 1) * 20;
                trail.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>


    <script>
        function handleLogin(event) {
            // Menghentikan reload halaman bawaan yang kuno
            event.preventDefault();

            // [Ruang inovasi masa depan: Kamu bisa memasukkan logika validasi NIM di sini nanti]

            // Melangkah ke dimensi berikutnya (pastikan nama file sesuai)
            window.location.href = 'dashboard.html';
        }
    </script>

</html>
