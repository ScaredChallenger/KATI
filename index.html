    <style>
        :root {
            --on-surface: #e5e2e1;
            --on-surface-variant: #b9cacb;
            --background: #000000;
            --surface-container: #161616;
            --outline-variant: #262626;
            --primary-fixed-dim: #00dbe9;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-specular: rgba(255, 255, 255, 0.12);
            --glass-shadow: rgba(0, 0, 0, 0.6);
        }

        body {
            background-color: var(--background);
            color: var(--on-surface);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        .glass-card {
            background: linear-gradient(135deg, var(--glass-bg), rgba(255, 255, 255, 0.01));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 var(--glass-shadow),
                inset 0 1px 0px var(--glass-specular),
                inset 0 -1px 2px rgba(0, 0, 0, 0.05);
        }

        .input-focus-ring:focus-within {
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="min-h-screen flex items-center justify-center relative">
    <main class="relative z-10 w-full max-w-[480px] px-container-margin my-auto">
        <!-- Login Card -->
        <div class="glass-card rounded-[24px] p-stack-lg shadow-2xl flex flex-col items-center">
            <!-- Brand Anchor Header (Identity from JSON) -->
            <div class="text-center mb-stack-lg">
                <h1 class="font-headline-lg text-headline-lg text-on-surface mb-base tracking-tight">CERTIFIED UPLOUDER
                </h1>
                <p class="font-body-md text-body-md text-on-surface-variant">Access your certification vault</p>
            </div>
            <!-- Access Form -->
            <form class="w-full space-y-stack-md" onsubmit="handleLogin(event)" novalidate>
                <!-- Student NIM Input -->
                <div class="space-y-base">
                    <label
                        class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest ml-1">Student
                        NIM</label>
                    <div
                        class="relative flex items-center bg-black/20 border border-outline-variant rounded-lg transition-all duration-300 input-focus-ring">
                        <span class="material-symbols-outlined absolute left-4 text-on-surface-variant"
                            data-icon="badge">badge</span>
                        <input id="login-nim"
                            class="w-full bg-transparent border-none text-on-surface pl-12 py-4 focus:ring-0 font-body-md placeholder:text-outline"
                            maxlength="8" placeholder="Enter your 8-digit NIM" type="text" required>
                    </div>
                    <p class="text-[11px] font-label-sm text-outline ml-1">Enter your 8-digit NIM</p>
                </div>
                <!-- Error Message Container -->
                <div id="error-message"
                    class="hidden text-error text-label-md bg-error-container/20 border border-error/50 p-3 rounded-lg text-center font-medium transition-all duration-300">
                </div>
                <!-- Submit Button -->
                <button
                    class="w-full bg-on-surface text-surface font-headline-md py-4 rounded-lg font-bold transition-all duration-300 hover:scale-[1.02] active:scale-95 shadow-[0_0_20px_rgba(255,255,255,0.1)] mt-base"
                    type="submit">
                    Submit NIM
                </button>
            </form>
            <!-- Admin & Lecturer Login Section -->
            <div class="w-full mt-stack-md">
                <div class="relative flex py-4 items-center">
                    <div class="flex-grow border-t border-outline-variant opacity-30"></div>
                    <span class="flex-shrink-0 mx-4 text-on-surface-variant font-label-sm uppercase tracking-widest text-[10px]">Admin &amp; Lecturer</span>
                    <div class="flex-grow border-t border-outline-variant opacity-30"></div>
                </div>

                <form class="w-full space-y-3" onsubmit="handleAdminLogin(event)" novalidate>
                    <div
                        class="relative flex items-center bg-black/20 border border-outline-variant rounded-lg transition-all duration-300 input-focus-ring">
                        <span class="material-symbols-outlined absolute left-3 text-on-surface-variant text-[18px]"
                            data-icon="admin_panel_settings">admin_panel_settings</span>
                        <input id="login-admin"
                            class="w-full bg-transparent border-none text-on-surface pl-10 py-3 focus:ring-0 font-body-md placeholder:text-outline text-sm"
                            type="text" placeholder="Admin ID / Username" required>
                    </div>
                    <div
                        class="relative flex items-center bg-black/20 border border-outline-variant rounded-lg transition-all duration-300 input-focus-ring">
                        <span class="material-symbols-outlined absolute left-3 text-on-surface-variant text-[18px]"
                            data-icon="key">key</span>
                        <input id="login-password"
                            class="w-full bg-transparent border-none text-on-surface pl-10 py-3 focus:ring-0 font-body-md placeholder:text-outline text-sm"
                            type="password" placeholder="Password" required>
                    </div>
                    <div id="error-message-admin"
                        class="hidden text-error text-[12px] bg-error-container/20 border border-error/50 p-2 rounded-lg text-center font-medium transition-all duration-300">
                    </div>
                    <button
                        class="w-full border border-outline-variant text-on-surface hover:bg-white/5 font-label-md py-3 rounded-lg font-bold transition-all duration-300 text-sm"
                        type="submit">
                        Access Admin Dashboard
                    </button>
                </form>
            </div>
        </div>
        <!-- Footer Policy (Consistent with JSON requirements) -->
        <div class="mt-stack-lg text-center px-gutter">
            <p class="font-label-sm text-label-sm text-on-surface-variant leading-relaxed opacity-60">
                By using this platform, you agree to the University Code of Conduct &amp; Privacy Policy.
            </p>
        </div>
    </main>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://pyazxjshahhqslhsafli.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5YXp4anNoYWhocXNsaHNhZmxpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MTAzMzYsImV4cCI6MjA5NzA4NjMzNn0.Muq2wy7hWGioFO886xNBt5GIcqS0osIi4Qad-eTkOOs';
        const supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        async function handleLogin(event) {
            // Menghentikan reload halaman bawaan yang kuno
            event.preventDefault();

            const nim = document.getElementById('login-nim').value.trim();
            const errorMsg = document.getElementById('error-message');

            // Reset error state
            errorMsg.classList.add('hidden');
            errorMsg.textContent = '';

            const isNimEmpty = nim === '';

            if (isNimEmpty) {
                showError("Silakan input NIM");
                return;
            }

            const nimRegex = /^[0-9]{8}$/;
            const isNimValid = nimRegex.test(nim);

            if (!isNimValid) {
                showError("NIM harus tepat 8 angka");
                return;
            }

            if (!supabaseClient) {
                showError("Gagal memuat database (Cek koneksi internet).");
                return;
            }

            const btn = document.querySelector('button[type="submit"]');
            const originalBtnText = btn.textContent;
            btn.disabled = true;
            btn.textContent = "Verifying...";

            try {
                // Cek data di tabel students
                const { data, error } = await supabaseClient
                    .from('students')
                    .select('*')
                    .eq('nim', nim);

                if (error) {
                    console.error(error);
                    showError("Terjadi kesalahan sistem saat mengecek database.");
                } else if (data.length === 0) {
                    showError("NIM tidak terdaftar di sistem.");
                } else {
                    // NIM ditemukan, ambil data nama dari database
                    const student = data[0];
                    localStorage.setItem('user_name', student.name);
                    localStorage.setItem('user_nim', student.nim);
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                console.error(err);
                showError("Gagal menghubungi server database.");
            } finally {
                btn.disabled = false;
                btn.textContent = originalBtnText;
            }

            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.classList.remove('hidden');
            }
        }

        async function handleAdminLogin(event) {
            event.preventDefault();

            const adminId = document.getElementById('login-admin').value.trim();
            const password = document.getElementById('login-password').value.trim();
            const errorMsg = document.getElementById('error-message-admin');

            errorMsg.classList.add('hidden');
            errorMsg.textContent = '';

            if (adminId === '' || password === '') {
                errorMsg.textContent = "Silakan isi Admin ID dan Password";
                errorMsg.classList.remove('hidden');
                return;
            }

            const btn = event.target.querySelector('button[type="submit"]');
            const originalBtnText = btn.textContent;
            btn.disabled = true;
            btn.textContent = "Verifying...";

            try {
                if (!supabaseClient) throw new Error("Supabase client not initialized");
                
                // Cek data di tabel admins (asumsi ada tabel admins)
                const { data, error } = await supabaseClient
                    .from('admins')
                    .select('*')
                    .eq('username', adminId)
                    .eq('password', password);

                if (error) {
                    console.error(error);
                    // Fallback to dummy login if table doesn't exist or error occurs
                    if (adminId === '10904626' && password === 'Rahasia') {
                        localStorage.setItem('admin_name', 'Administrator');
                        window.location.href = 'dashboard_admin.html';
                    } else {
                        errorMsg.textContent = "Login gagal: " + error.message;
                        errorMsg.classList.remove('hidden');
                    }
                } else if (data && data.length > 0) {
                    const admin = data[0];
                    localStorage.setItem('admin_name', admin.name || 'Administrator');
                    window.location.href = 'dashboard_admin.html';
                } else {
                    // Fallback dummy login
                    if (adminId === '10904626' && password === 'Rahasia') {
                        localStorage.setItem('admin_name', 'Administrator');
                        window.location.href = 'dashboard_admin.html';
                    } else {
                        errorMsg.textContent = "ID atau Password Admin salah.";
                        errorMsg.classList.remove('hidden');
                    }
                }
            } catch (err) {
                console.error(err);
                // Fallback dummy login for frontend testing without internet/db
                if (adminId === '10904626' && password === 'Rahasia') {
                    localStorage.setItem('admin_name', 'Administrator');
                    window.location.href = 'dashboard_admin.html';
                } else {
                    errorMsg.textContent = "Gagal menghubungi server database.";
                    errorMsg.classList.remove('hidden');
                }
            } finally {
                btn.disabled = false;
                btn.textContent = originalBtnText;
            }
        }
    </script>
