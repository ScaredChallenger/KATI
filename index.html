<!DOCTYPE html>
<html class="dark" lang="en" style="">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>KATI-CERTIFIED UPLOUDER - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#0e0e0e",
                        "primary": "#dbfcff",
                        "surface-bright": "#3a3939",
                        "on-secondary-fixed-variant": "#7200a3",
                        "on-primary-fixed": "#002022",
                        "outline": "#849495",
                        "on-background": "var(--on-surface)",
                        "primary-fixed-dim": "var(--primary-fixed-dim)",
                        "surface-dim": "var(--background)",
                        "tertiary-fixed-dim": "#e9c400",
                        "on-tertiary-fixed-variant": "#554600",
                        "on-primary-container": "#006970",
                        "on-surface": "var(--on-surface)",
                        "outline-variant": "var(--outline-variant)",
                        "background": "var(--background)",
                        "tertiary-fixed": "#ffe171",
                        "inverse-on-surface": "#313030",
                        "secondary-fixed": "#f6d9ff",
                        "primary-fixed": "#7df4ff",
                        "surface-container-low": "var(--background)",
                        "on-secondary": "#510074",
                        "surface-container": "var(--surface-container)",
                        "secondary": "#e9b3ff",
                        "inverse-surface": "var(--on-surface)",
                        "on-primary": "#00363a",
                        "tertiary": "#fff5dd",
                        "on-tertiary-container": "#705d00",
                        "primary-container": "#00f0ff",
                        "surface-container-highest": "var(--surface-container)",
                        "surface-container-high": "var(--surface-container)",
                        "secondary-fixed-dim": "#e9b3ff",
                        "on-tertiary": "#3b2f00",
                        "on-primary-fixed-variant": "#004f54",
                        "on-secondary-container": "#e5a9ff",
                        "on-secondary-fixed": "#310048",
                        "on-surface-variant": "var(--on-surface-variant)",
                        "surface-variant": "#353534",
                        "on-error": "#690005",
                        "surface-tint": "#00dbe9",
                        "error": "#ffb4ab",
                        "error-container": "#93000a",
                        "secondary-container": "#7d01b1",
                        "on-tertiary-fixed": "#221b00",
                        "on-error-container": "#ffdad6",
                        "inverse-primary": "#006970",
                        "tertiary-container": "#ffd60b",
                        "surface": "#131313"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "12px",
                        "container-margin": "24px",
                        "base": "8px",
                        "gutter": "24px",
                        "stack-md": "24px",
                        "section-gap": "80px",
                        "stack-lg": "48px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["28px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
    <style>
        :root {
            --on-surface: #e5e2e1;
            --on-surface-variant: #b9cacb;
            --background: #000000;
            --surface-container: #161616;
            --outline-variant: #262626;
            --primary-fixed-dim: #00dbe9;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-specular: rgba(255, 255, 255, 0.12);
            --glass-shadow: rgba(0, 0, 0, 0.6);
        }

        body {
            background-color: var(--background);
            color: var(--on-surface);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        .glass-card {
            background: linear-gradient(135deg, var(--glass-bg), rgba(255, 255, 255, 0.01));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 var(--glass-shadow), 
                        inset 0 1px 0px var(--glass-specular),
                        inset 0 -1px 2px rgba(0, 0, 0, 0.05);
        }

        .input-focus-ring:focus-within {
            border-color: #00dbe9;
            box-shadow: 0 0 15px rgba(0, 219, 233, 0.2);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center relative bg-surface">
    <main class="relative z-10 w-full max-w-[480px] px-container-margin my-auto">
        <!-- Login Card -->
        <div class="glass-card rounded-[24px] p-stack-lg shadow-2xl flex flex-col items-center">
            <!-- Brand Anchor Header (Identity from JSON) -->
            <div class="text-center mb-stack-lg">
                <h1 class="font-headline-lg text-headline-lg text-on-surface mb-base tracking-tight">CERTIFIED UPLOUDER
                </h1>
                <p class="font-body-md text-body-md text-on-surface-variant">Access your certification vault</p>
            </div>
            <!-- Access Form -->
            <form class="w-full space-y-stack-md" onsubmit="handleLogin(event)">
                <!-- Full Name Input -->
                <div class="space-y-base">
                    <label
                        class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest ml-1">Full
                        Name</label>
                    <div
                        class="relative flex items-center bg-black/20 border border-outline-variant rounded-lg transition-all duration-300 input-focus-ring">
                        <span class="material-symbols-outlined absolute left-4 text-on-surface-variant"
                            data-icon="person">person</span>
                        <input id="login-name"
                            class="w-full bg-transparent border-none text-on-surface pl-12 py-4 focus:ring-0 font-body-md placeholder:text-outline"
                            placeholder="Enter your full name" type="text" required>
                    </div>
                </div>
                <!-- Student NIM Input -->
                <div class="space-y-base">
                    <label
                        class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest ml-1">Student
                        NIM</label>
                    <div
                        class="relative flex items-center bg-black/20 border border-outline-variant rounded-lg transition-all duration-300 input-focus-ring">
                        <span class="material-symbols-outlined absolute left-4 text-on-surface-variant"
                            data-icon="badge">badge</span>
                        <input id="login-nim"
                            class="w-full bg-transparent border-none text-on-surface pl-12 py-4 focus:ring-0 font-body-md placeholder:text-outline"
                            maxlength="9" placeholder="Enter your 9-digit NIM" type="text" required>
                    </div>
                    <p class="text-[11px] font-label-sm text-outline ml-1">Enter your 9-digit NIM</p>
                </div>
                <!-- Submit Button -->
                <button
                    class="w-full bg-on-surface text-surface font-headline-md py-4 rounded-lg font-bold transition-all duration-300 hover:scale-[1.02] active:scale-95 shadow-[0_0_20px_rgba(255,255,255,0.1)] mt-base"
                    type="submit">
                    Submit NIM and Name
                </button>
            </form>
            <!-- Social/Secondary Visuals (Optional micro-interaction) -->
            <div class="mt-stack-lg w-full flex items-center justify-center gap-base opacity-20">
                <div class="h-[1px] flex-grow bg-outline-variant"></div>
                <span class="material-symbols-outlined text-[16px]" data-icon="security">security</span>
                <div class="h-[1px] flex-grow bg-outline-variant"></div>
            </div>
        </div>
        <!-- Footer Policy (Consistent with JSON requirements) -->
        <div class="mt-stack-lg text-center px-gutter">
            <p class="font-label-sm text-label-sm text-on-surface-variant leading-relaxed opacity-60">
                By using this platform, you agree to the University Code of Conduct &amp; Privacy Policy.
            </p>
        </div>
    </main>

    <script>
        function handleLogin(event) {
            // Menghentikan reload halaman bawaan yang kuno
            event.preventDefault();

            const name = document.getElementById('login-name').value;
            const nim = document.getElementById('login-nim').value;

            if (name && nim) {
                localStorage.setItem('user_name', name);
                localStorage.setItem('user_nim', nim);
                window.location.href = 'dashboard.html';
            }
        }
    </script>

</html>
